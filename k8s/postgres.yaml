apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: mammoth-search-watch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: search_watch
            - name: POSTGRES_USER
              value: mammoth_search_watch
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: search-watch-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U mammoth_search_watch -d search_watch"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mammoth-search-watch
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
